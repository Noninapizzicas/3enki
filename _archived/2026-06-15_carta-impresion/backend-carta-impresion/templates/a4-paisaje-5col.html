<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{nombre_carta}} · 5 Columnas</title>
  <style>
    /* =====================================================
       PLANTILLA: A4 Apaisado 5 Columnas
       Uso: Cartas extensas con muchas categorías, todo en un folio
       Imprimir: Ctrl+P → Horizontal → Sin márgenes → PDF
       ===================================================== */

    @page {
      size: A4 landscape;
      margin: 0.8cm 1cm;
    }

    * {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 6.5pt;
      color: #111;
      background: #fff;
      line-height: 1.4;
    }

    /* Cabecera compacta */
    .cabecera {
      text-align: center;
      padding-bottom: 0.3cm;
      margin-bottom: 0.3cm;
      border-bottom: 2px solid #111;
    }

    .cabecera h1 {
      font-size: 13pt;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .cabecera .meta {
      font-size: 6pt;
      color: #777;
      margin-top: 0.05cm;
    }

    /* 5 columnas con CSS multi-column */
    .carta-contenido {
      column-count: 5;
      column-gap: 0.5cm;
      column-fill: auto;
    }

    /* Categorías — no se parten entre columnas */
    .categoria {
      break-inside: avoid;
      margin-bottom: 0.35cm;
    }

    .categoria-nombre {
      font-size: 7pt;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #111;
      color: #fff;
      padding: 0.08cm 0.15cm;
      margin-bottom: 0.12cm;
    }

    /* Productos */
    .producto {
      display: flex;
      flex-direction: column;
      padding: 0.08cm 0;
      border-bottom: 1px dotted #ccc;
    }

    .producto:last-child { border-bottom: none; }

    .producto-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.1cm;
    }

    .producto-nombre {
      font-size: 6.5pt;
      font-weight: 600;
      flex: 1;
    }

    .precio {
      font-size: 6.5pt;
      font-weight: 700;
      white-space: nowrap;
    }

    .producto-ingredientes {
      font-size: 5.5pt;
      color: #777;
      margin-top: 0.02cm;
      font-style: italic;
      line-height: 1.3;
    }

    /* Pie */
    .pie {
      margin-top: 0.3cm;
      text-align: center;
      font-size: 6pt;
      color: #bbb;
      border-top: 1px solid #ddd;
      padding-top: 0.15cm;
    }

    /* Preview en pantalla */
    @media screen {
      body {
        max-width: 29.7cm;
        margin: 1cm auto;
        padding: 1cm;
        box-shadow: 0 0 12px rgba(0,0,0,0.2);
        font-size: 7pt;
      }
      .cabecera h1 { font-size: 16pt; }
    }
  </style>
</head>
<body>

  <div class="cabecera">
    <h1>{{nombre_carta}}</h1>
    <div class="meta">{{total_categorias}} secciones · {{total_productos}} platos · {{fecha}}</div>
  </div>

  <div class="carta-contenido">
    {{categorias_html}}
  </div>

  <div class="pie">{{nombre_carta}}</div>

</body>
</html>
