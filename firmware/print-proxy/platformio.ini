; PlatformIO Project Configuration
; ESP32 Print Proxy — MQTT ←→ BLE thermal printer bridge
;
; Conecta al VPS via MQTT/WiFi y reenvía ESC/POS a impresora
; Netum Mini (NT-1809) por Bluetooth.
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Particiones con espacio para OTA
board_build.partitions = min_spiffs.csv

lib_deps =
    ; MQTT client — ligero y probado
    knolleary/PubSubClient@^2.8
    ; BLE — NimBLE es mas eficiente que la BLE default del ESP32
    h2zero/NimBLE-Arduino@^1.4.0
    ; Base64 decode
    agdl/Base64@^1.0.0
    ; JSON parse/serialize
    bblanchon/ArduinoJson@^7.0.0
    ; WiFi Manager — config WiFi sin hardcodear
    tzapu/WiFiManager@^2.0.17

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Desactivar BLE clasico para ahorrar RAM (~30KB)
    -DCONFIG_BT_CLASSIC_ENABLED=0
    -DCONFIG_BTDM_CTRL_MODE_BLE_ONLY=1
