# Crawl4RS (repo D-os) — el crawler pesado (navegador real Chromium + stealth)
# como contenedor en el VPS. Es el motor que consume el puente modules/crawl4rs.
#
# Docker y no nativo A PROPÓSITO: el binario Rust es limpio, pero arrastra
# Chromium (la dependencia sucia). El reparto es por NATURALEZA — igual que
# python-tools — así que Chromium queda contenido y el VPS lean.
#
# DOS MARCHAS (D-os): la marcha corta (crawl4rs, HTTP determinista + su propio
# navegador) va SIEMPRE. La marcha larga (browser, wrapper de Playwright con
# login/interceptar/stealth/emular) es OPT-IN por perfil — ver más abajo.
#
# Traer y levantar (SOLO marcha corta — comportamiento de siempre):
#   git clone --depth 1 https://github.com/noninapizzicas/d-os /opt/d-os
#   docker network create enki-web   # una vez (la comparte con SearXNG)
#   CRAWL4RS_JWT_SECRET=$(openssl rand -hex 32) \
#     docker compose -f deployment/crawl4rs/docker-compose.yml up -d --build
#   (guarda el secreto en /opt/enki/data/.env para que sobreviva reinicios)
#
# Verificar:  curl -s http://127.0.0.1:8081/health
# Cablear:    nada — modules/crawl4rs ya apunta a :8081. Solo encender el
#             interruptor 'crawl4rs' (panel/sistema, OFF por defecto).
#
# Puerto: 127.0.0.1:8081 (el :8080 local es de SearXNG). Solo localhost:
# lo consume el core, no la web.

services:
  crawl4rs:
    build:
      # Clon del repo D-os en el VPS. Override: DOS_DIR=/ruta docker compose ...
      context: ${DOS_DIR:-/opt/d-os}
      dockerfile: Dockerfile
      # OBLIGATORIO: sin target, docker construye la ÚLTIMA etapa del Dockerfile
      # de D-os — 'minimal' (distroless, SIN Chromium ni bash: ni navegador ni
      # healthcheck). 'runtime' es la imagen Debian slim + Chromium.
      target: runtime
    image: enki-crawl4rs
    container_name: enki-crawl4rs
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      # LEY DE LA FRONTERA (D-os): este compose publica SOLO a 127.0.0.1 → la
      # frontera vive en el host, no en el contenedor (que bindea 0.0.0.0 por
      # necesidad del port-mapping). Auth abierta DECLARADA. Si algún día
      # expones el puerto, exporta CRAWL4RS_JWT_SECRET y la auth se activa sola.
      - CRAWL4RS_AUTH=${CRAWL4RS_AUTH:-abierta}
      - CRAWL4RS_JWT_SECRET
      # Opcional: exige x-api-key en /auth/token. Passthrough SIN '=': solo
      # llega al contenedor si existe en el entorno del host. CLAVE: el server
      # de D-os trata la variable PRESENTE (aunque vacía) como clave configurada
      # — pasarla siempre con ${VAR:-} dejaba /auth/token blindado con clave ""
      # y el puente moría en 401 (visto en vivo). Si la usas, ponla también en
      # el core (env CRAWL4RS_API_KEY) para el puente.
      - CRAWL4RS_API_KEY
      # Opcional: backend de /search (crawl4rs.buscar). El inquilino SearXNG
      # (python-tools) vive en la red compartida enki-web y se alcanza por su
      # nombre de contenedor. Sin él levantado, /search responde 503 con
      # prescripción ("define SEARXNG_URL"); leer/mapear/rastrear siguen.
      - SEARXNG_URL=${SEARXNG_URL:-http://enki-searxng:8080}
      # MARCHA LARGA (opt-in): VACÍO por defecto → la escalación usa el navegador
      # PROPIO del contenedor (comportamiento de siempre, sin cambios). Para
      # enrutar la marcha larga al wrapper de Playwright (login/interceptar/
      # stealth/emular), levanta el perfil 'larga' y exporta la variable:
      #   CRAWL4RS_PLAYWRIGHT_URL=http://browser:8100 \
      #     docker compose -f deployment/crawl4rs/docker-compose.yml \
      #     --profile larga up -d --build
      - CRAWL4RS_PLAYWRIGHT_URL=${CRAWL4RS_PLAYWRIGHT_URL:-}
      # Opcional: receta de auto-login (JSON { url, pasos }). Solo surte efecto
      # con la marcha larga activa. Monta el fichero (volumes, abajo).
      - CRAWL4RS_LOGIN=${CRAWL4RS_LOGIN:-}
    # Chromium revienta con los 64MB de /dev/shm por defecto de Docker.
    shm_size: "1gb"
    networks: [enki-web]
    restart: unless-stopped
    # volumes:
    #   # Descomenta junto con CRAWL4RS_LOGIN=/etc/crawl4rs/login.json
    #   - ./login.json:/etc/crawl4rs/login.json:ro
    healthcheck:
      # La imagen (debian slim) no trae curl; TCP-check con bash basta.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MARCHA LARGA (opt-in, perfil 'larga') ──────────────────────────────────
  # Wrapper HTTP de Playwright (repo D-os, bridge/playwright-wrapper). Es la
  # segunda marcha del motor: cuando la corta topa con login, JS pesado, API
  # interna o anti-bot, crawl4rs escala aquí por HTTP (CRAWL4RS_PLAYWRIGHT_URL).
  #
  # ADITIVO Y NO-DESTRUCTIVO: vive tras 'profiles: [larga]'. El `docker compose
  # up` de siempre NI LO MIRA — la marcha corta queda idéntica. Solo se
  # construye/levanta con `--profile larga`. Parte de la imagen oficial de
  # Playwright (Chromium + libs incluidos): lanza su propio navegador.
  #
  # Alternativa (topología "embutido"): si ya tienes un contenedor con Chromium
  # CORRIENDO, no construyas esta imagen — mete el server.js del wrapper dentro
  # y ponle PLAYWRIGHT_CDP_URL apuntando al Chromium en marcha (se conecta, no
  # lanza un segundo navegador). El contrato no cambia — es cable.
  browser:
    profiles: ["larga"]
    build:
      context: ${DOS_DIR:-/opt/d-os}/bridge/playwright-wrapper
      dockerfile: Dockerfile
    image: enki-crawl4rs-browser
    container_name: enki-crawl4rs-browser
    # environment:
    #   # Topología "embutido": conectar a un Chromium ya corriendo por CDP.
    #   PLAYWRIGHT_CDP_URL: "http://127.0.0.1:9222"
    expose:
      - "8100"                 # solo red interna enki-web; no se publica al host
    shm_size: "1gb"            # Chromium revienta con los 64MB por defecto
    networks: [enki-web]
    restart: unless-stopped
    healthcheck:
      # La imagen de Playwright trae Node pero no curl: healthcheck con node.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:8100/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Red compartida entre órganos web (crawl4rs ↔ searxng ↔ browser). Se crea una
# vez:  docker network create enki-web
networks:
  enki-web:
    external: true
