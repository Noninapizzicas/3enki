; PlatformIO Project Configuration
; Enki ESP32 Driver: Cocina Display (Kiosk Web)
;
; Hardware: ESP32-P4 + pantalla 10.1" 800x1280 MIPI-DSI
; Función: carga la URL /cocina del VPS y muestra pedidos en tiempo real
;
; Usa la librería compartida enki-base (WiFi, MQTT, OTA, Portal, NVS)
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:esp32p4]
platform = espressif32
board = esp32-p4-function-ev-board
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv

; Shared enki-base library
lib_extra_dirs = ../../lib

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    lvgl/lvgl@^9.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    ; Display: 800x1280 portrait
    -DDISP_HOR_RES=800
    -DDISP_VER_RES=1280
