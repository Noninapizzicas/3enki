name: validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-architecture:
    name: Architecture validation + POC tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate architecture (8 contracts vs baseline)
        run: npm run validate:ci

      - name: Run POC tests (ai-gateway-poc)
        run: npm run test:ai-gateway-poc

      - name: Run unit tests (scheduler — migracion canonica)
        run: npm run test:scheduler

      - name: Run unit tests (credential-manager — descomposicion canonica)
        run: npm run test:credential-manager

      - name: Run unit tests (project-manager — reescritura canonica)
        run: npm run test:project-manager

      - name: Run unit tests (database-manager — reescritura canonica)
        run: npm run test:database-manager

      - name: Run unit tests (composition-manager — reescritura canonica)
        run: npm run test:composition-manager

      - name: Run unit tests (gateway-manager — reescritura canonica)
        run: npm run test:gateway-manager

      - name: Run unit tests (plugin-manager — reescritura canonica)
        run: npm run test:plugin-manager

      - name: Run unit tests (conversacion/ai-gateway — reescritura canonica)
        run: npm run test:conversacion__ai-gateway

      - name: Run POC tests (cocina-poc)
        run: npm run test:cocina-poc

      - name: Run chat-io tests (chat-flow migration)
        run: npm run test:chat-io

      - name: Run prompt-builder tests (chat-flow migration)
        run: npm run test:prompt-builder

      - name: Run ai-gateway chat tests (chat-flow migration)
