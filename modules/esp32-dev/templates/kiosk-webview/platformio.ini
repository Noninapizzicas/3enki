; PlatformIO Project Configuration
; {{PROJECT_NAME}} — Kiosk WebView display
;
; Arranca WiFi, carga URL en WebView, watchdog + OTA.
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:{{BOARD}}]
platform = {{PLATFORM}}
board = {{BOARD}}
framework = {{FRAMEWORK}}
monitor_speed = {{MONITOR_SPEED}}
upload_speed = {{UPLOAD_SPEED}}

; Particiones con espacio para OTA
board_build.partitions = min_spiffs.csv

lib_deps =
    ; MQTT para recibir comandos y reportar estado
    knolleary/PubSubClient@^2.8
    ; JSON parse/serialize
    bblanchon/ArduinoJson@^7.0.0
    ; OTA updates
    ; WebServer para portal cautivo

build_flags =
    -DCORE_DEBUG_LEVEL=3
