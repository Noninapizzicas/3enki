name: validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-architecture:
    name: Architecture validation + POC tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate architecture (8 contracts vs baseline)
        run: npm run validate:ci

      - name: Run POC tests (ai-gateway-poc)
        run: npm run test:ai-gateway-poc

      - name: Run unit tests (scheduler — migracion canonica)
        run: npm run test:scheduler

      - name: Run unit tests (credential-manager — descomposicion canonica)
        run: npm run test:credential-manager

      - name: Run unit tests (project-manager — reescritura canonica)
        run: npm run test:project-manager

      - name: Run unit tests (database-manager — reescritura canonica)
        run: npm run test:database-manager

      - name: Run unit tests (composition-manager — reescritura canonica)
        run: npm run test:composition-manager

      - name: Run unit tests (gateway-manager — reescritura canonica)
        run: npm run test:gateway-manager

      - name: Run unit tests (plugin-manager — reescritura canonica)
        run: npm run test:plugin-manager

      - name: Run unit tests (conversacion/ai-gateway — reescritura canonica)
        run: npm run test:conversacion__ai-gateway

      - name: Run unit tests (conversacion/ai-gateway — cajones-context-partitioning v1.0.0)
        run: npm run test:ai-gateway-cajones

      - name: Run unit tests (core/modules/loader — tool bus auto-subscription)
        run: npm run test:core-module-loader-tool-bus

      - name: Run unit tests (core/modules/loader — publica core.modules.loaded.all)
        run: npm run test:core-module-loader-modules-loaded-all

      - name: Run unit tests (core/modules/loader — tool ui auto-registration)
        run: npm run test:core-module-loader-tool-ui

      - name: Run unit tests (core/modules/loader — tools_http runtime)
        run: npm run test:core-module-loader-tools-http

      - name: Run smoke tests (ai-gateway — bus-only tool invocation)
        run: npm run test:ai-gateway-smoke-tools

      - name: Run smoke tests (ai-gateway — blueprint-driven modules pilot)
        run: npm run test:ai-gateway-smoke-blueprints

      - name: Run POC tests (cocina-poc)
        run: npm run test:cocina-poc

      - name: Run chat-io tests (chat-flow migration)
        run: npm run test:chat-io

      - name: Run prompt-builder tests (chat-flow migration)
        run: npm run test:prompt-builder

      - name: Run ai-gateway chat tests (chat-flow migration)
        run: npm run test:ai-gateway-chat

      - name: Run memory-user-profile tests (memoria modular)
        run: npm run test:memory-user-profile

      - name: Run memory-conversation-summary tests (memoria narrativa)
        run: npm run test:memory-conversation-summary

      - name: Run ai-gateway embedding tests (embedding-flow)
        run: npm run test:ai-gateway-embedding

      - name: Run memory-rag tests (memoria semantica)
        run: npm run test:memory-rag

      - name: Run ai-agent-framework tests (agent-flow migration)
        run: npm run test:ai-agent-framework

      - name: Run agent-observer tests (agente-vive-en-chat)
        run: npm run test:agent-observer

      - name: Run mqttRequest unit tests
        run: npm run test:mqtt-request

      # DISABLED 2026-05-19 (PR #170): el commit afb6b915 migro carta-scheduler
      # a blueprint puro (sin index.js) pero no actualizo este test, que asume
      # un modulo JS con onProjectActivated. Reactivar cuando el test sea
      # reescrito para validar el blueprint v1 de carta-scheduler.
