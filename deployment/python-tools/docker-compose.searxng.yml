# SearXNG — backend de búsqueda para `crawl4rs.buscar` (OPCIONAL).
#
# Solo hace falta si quieres `crawl4rs.buscar` (búsqueda de palabra-clave en la
# web abierta). leer/mapear/rastrear/entrar/abrir NO lo necesitan (van por obscura).
# SearXNG es Python → va en Docker, aislado. El módulo crawl4rs corre NATIVO en el
# host y lo llama por HTTP en 127.0.0.1:8080 (env SEARXNG_URL).
#
# Levantar:  docker compose -f deployment/python-tools/docker-compose.searxng.yml up -d
# Cablear:   nada — modules/crawl4rs apunta a http://localhost:8080 por defecto.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: enki-searxng
    ports:
      - "127.0.0.1:8080:8080"   # el módulo crawl4rs (host) lo llama aquí (SEARXNG_URL)
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      # Secreto propio (vps-setup lo genera como SEARXNG_SECRET_KEY en data/.env).
      # OJO nombre: la app de SearXNG honra SEARXNG_SECRET (sin _KEY) — con el
      # nombre equivocado cae al default 'ultrasecretkey' y se NIEGA a arrancar
      # (bucle de reinicio, visto en vivo). Fail-closed: sin el secreto no levanta.
      - SEARXNG_SECRET=${SEARXNG_SECRET_KEY:?pon SEARXNG_SECRET_KEY (openssl rand -hex 32)}
    volumes:
      - searxng-data:/etc/searxng
      # Habilita format=json — crawl4rs /search lo exige; sin esto, 403 (visto en vivo).
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    networks: [enki-web]

volumes:
  searxng-data:

networks:
  enki-web:
    external: true
