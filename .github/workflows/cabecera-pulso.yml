# CÚPULA DE LA CABECERA — el PULSO semanal (órgano químico).
# Re-verifica el repo entero: si hay rebanadas stale, módulos huérfanos o
# fuentes muertas acumulados, abre (o actualiza) UN Issue con la lista.
# Silencio cuando todo está fresco.
name: cabecera-pulso

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pulso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar cúpula (repo entero)
        run: node scripts/cabecera/validate-cabecera.js --json | tee /tmp/cabecera.json

      - name: Issue si hay deuda de cabecera
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('/tmp/cabecera.json', 'utf8'));
            const total = r.stale.length + r.huerfanos.length + r.fuentesMuertas.length + r.errores.length;
            const titulo = '📜 cabecera: deuda de frescura';
            const { data: abiertos } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'cabecera', per_page: 10
            });
            const previo = abiertos.find((i) => i.title === titulo);

            if (total === 0) {
              if (previo) {
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: previo.number, body: '✓ Pulso: todo fresco — cierro.' });
                await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: previo.number, state: 'closed' });
              }
              return;
            }

            const lineas = [`Pulso del ${new Date().toISOString().slice(0, 10)} — ${total} hallazgo(s):`, ''];
            for (const e of r.errores) lineas.push(`- ✗ ERROR \`${e.archivo || ''}\` [${e.tipo}] ${e.detalle}`);
            for (const s of r.stale) lineas.push(`- ⚠ STALE \`arquitectura/cabecera/${s.archivo}\` (fuentes al ${s.fuentes_desde}, rebanada al ${s.rebanada_desde})`);
            for (const h of r.huerfanos) lineas.push(`- ⚠ HUÉRFANO \`${h.modulo}\` sin rebanada que lo cubra`);
            for (const f of r.fuentesMuertas) lineas.push(`- ⚠ FUENTE MUERTA \`${f.archivo}\`: ${f.fuente}`);
            lineas.push('', 'Cura: actualizar la rebanada (o sellar `verificado:`) · dar hogar al huérfano en unas `fuentes` · retirar la fuente muerta.');
            const cuerpo = lineas.join('\n');

            if (previo) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: previo.number, body: cuerpo });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: titulo, body: cuerpo, labels: ['cabecera'] });
            }
