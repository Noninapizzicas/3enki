<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comandero - Event Core POS</title>

  <!-- UI Components Styles -->
  <link rel="stylesheet" href="../../ui-components/producto-button/producto-button.css">
  <link rel="stylesheet" href="../../ui-components/sidebar-button/sidebar-button.css">

  <!-- View Styles -->
  <link rel="stylesheet" href="./comandero.css">
</head>
<body>
  <!-- Main Container -->
  <div class="comandero-view" data-view="comandero">

    <!-- Header -->
    <header class="comandero-header">
      <div class="header-left">
        <span class="header-icon">📝</span>
        <h1 class="header-title" id="cuentaNombre">Mesa 1</h1>
        <span class="header-tipo" id="cuentaTipo">Local</span>
      </div>
      <div class="header-right">
        <div class="pedido-summary">
          <span class="summary-items" id="itemsCount">0 items</span>
          <span class="summary-divider">•</span>
          <span class="summary-total" id="totalAmount">€0.00</span>
        </div>
      </div>
    </header>

    <!-- Topbar (Categories) -->
    <div class="comandero-topbar" id="topbarCategories">
      <!-- Category buttons generated dynamically -->
    </div>

    <!-- Main Content Area -->
    <main class="comandero-main">

      <!-- Products Grid -->
      <div class="productos-container">
        <div class="productos-grid" id="productosGrid">
          <!-- Product buttons generated dynamically by category -->
        </div>

        <!-- Cobro Section -->
        <div class="cobro-section" id="cobroSection">
          <h2 class="cobro-title">💰 Cobrar Cuenta</h2>

          <div class="cobro-resumen">
            <div class="resumen-item">
              <span class="resumen-label">Subtotal:</span>
              <span class="resumen-value" id="subtotal">€0.00</span>
            </div>
            <div class="resumen-item">
              <span class="resumen-label">IVA (21%):</span>
              <span class="resumen-value" id="iva">€0.00</span>
            </div>
            <div class="resumen-item resumen-total">
              <span class="resumen-label">Total:</span>
              <span class="resumen-value" id="totalFinal">€0.00</span>
            </div>
          </div>

          <div class="cobro-items" id="cobroItems">
            <!-- Order items list -->
          </div>

          <div class="cobro-actions">
            <button class="btn-cobrar" id="btnCobrar">
              <span class="btn-icon">💰</span>
              <span class="btn-text">Cobrar</span>
            </button>
            <button class="btn-imprimir" id="btnImprimir">
              <span class="btn-icon">🖨️</span>
              <span class="btn-text">Imprimir</span>
            </button>
          </div>
        </div>
      </div>

    </main>

    <!-- Floating Sidebar (Right) -->
    <aside class="comandero-sidebar" id="sidebar">
      <!-- Sidebar buttons generated dynamically -->
    </aside>

  </div>

  <!-- Modal: Variaciones de Producto -->
  <div class="modal" id="modalVariaciones" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('modalVariaciones')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Variaciones</h3>
        <button class="modal-close" onclick="closeModal('modalVariaciones')">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Variaciones content -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('modalVariaciones')">Cancelar</button>
        <button class="btn-primary" onclick="addVariation()">Añadir</button>
      </div>
    </div>
  </div>

  <!-- Modal: Mitad y Mitad -->
  <div class="modal" id="modalMitad" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('modalMitad')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">🍕 Pizza Mitad y Mitad</h3>
        <button class="modal-close" onclick="closeModal('modalMitad')">✕</button>
      </div>
      <div class="modal-body">
        <p>Selecciona dos pizzas para combinar en mitades.</p>
        <!-- Mitad y Mitad content -->
      </div>
    </div>
  </div>

  <!-- Modal: Pizza al Gusto -->
  <div class="modal" id="modalGusto" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('modalGusto')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">🎨 Pizza al Gusto</h3>
        <button class="modal-close" onclick="closeModal('modalGusto')">✕</button>
      </div>
      <div class="modal-body">
        <p>Personaliza tu pizza con los ingredientes que prefieras.</p>
        <!-- Pizza al Gusto content -->
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- UI Components Scripts -->
  <script src="../../ui-components/producto-button/producto-button.js"></script>
  <script src="../../ui-components/sidebar-button/sidebar-button.js"></script>

  <!-- View Controller -->
  <script src="./comandero.js"></script>
</body>
</html>
