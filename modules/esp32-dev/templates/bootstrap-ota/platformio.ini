; PlatformIO Project Configuration
; {{PROJECT_NAME}} — Bootstrap OTA
;
; Firmware base: portal cautivo WiFi + MQTT + OTA.
; Se flashea una vez por USB. Todo lo demas se hace via OTA.
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:{{BOARD}}]
platform = {{PLATFORM}}
board = {{BOARD}}
framework = {{FRAMEWORK}}
monitor_speed = {{MONITOR_SPEED}}
upload_speed = {{UPLOAD_SPEED}}

; Particiones con espacio para OTA (2 slots de app)
board_build.partitions = min_spiffs.csv

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
