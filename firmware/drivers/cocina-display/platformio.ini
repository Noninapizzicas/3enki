; PlatformIO Project Configuration
; Enki ESP32 Driver: Cocina Display
;
; Hardware: ESP32-P4 + pantalla MIPI-DSI
; Función: muestra pedidos de cocina en tiempo real via MQTT/LVGL
;
; Usar la librería compartida enki-base (WiFi, MQTT, OTA, Portal, NVS)
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:esp32p4]
platform = espressif32
board = esp32-p4-function-ev-board
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi   ; PSRAM OPI (ESP32-P4 tiene PSRAM integrado)

; Librería compartida enki-base
lib_extra_dirs = ../../lib

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    lvgl/lvgl@^9.2.0

; ── Build flags ──────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

    ; LVGL: buscar lv_conf.h en src/
    -DLV_CONF_INCLUDE_SIMPLE
    -I src

    ; Resolución del display
    -DDISP_HOR_RES=800
    -DDISP_VER_RES=1280

    ; Optimización: el ESP32-P4 tiene FPU, aprovecharla
    -O2
    -mfpu=fpv4-sp-d16

    ; Stack del loop más grande (LVGL necesita espacio)
    -DARDUINO_LOOP_STACK_SIZE=8192

; ── Notas de panel ───────────────────────────────────────────────────────────
; Para conectar el panel físico, agregar el componente IDF del panel:
;
;   ESP32-P4-Function-EV-Board (panel oficial Espressif 7"):
;     lib_deps += idf_component_manager/idf-component-manager@*
;     # componente: esp_lcd_ek79007 + esp_lcd_touch_gt1151
;
;   Panel 10" con ILI9881C:
;     # componente: esp_lcd_ili9881c + esp_lcd_touch_gt911
;
; Ver display_driver.cpp para el patrón de inicialización.
