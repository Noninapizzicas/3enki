; PlatformIO Project Configuration
; Enki ESP32 Driver: Print Proxy
;
; Usa la librería compartida enki-base (firmware/lib/enki-base)
; LÓGICA: MQTT ←→ BLE thermal printer bridge
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = min_spiffs.csv

; Shared enki-base library
lib_extra_dirs = ../../lib

lib_deps =
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
