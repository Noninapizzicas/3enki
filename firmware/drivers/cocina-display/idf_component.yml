## IDF Component Manager — dependencias de hardware del display
##
## PlatformIO (con framework = espidf o arduino+espidf) descarga estos
## componentes automáticamente al compilar.
##
## Board: Guition JC8012P4A1
## Panel: ILI9881C (MIPI-DSI)
## Touch: GT911 (I2C)

dependencies:
  espressif/esp_lcd_ili9881c: "^1.0"
  espressif/esp_lcd_touch_gt911: "^1.0"
  idf:
    version: ">=5.3.0"
