[platformio]
default_envs = esp32-p4
src_dir = src

[env:esp32-p4]
platform = espressif32@6.5.0
board = esp32-p4-devkit
framework = espidf
build_flags =
    -DVERSION=\"1.0.0\"
    -DPROJECT_COCINA=1
    -DCONFIG_LVGL_TICK_PERIOD_MS=10
    -DCONFIG_ESP_BROWSER_ENABLED=1
    -DCONFIG_MQTT_ENABLED=1

# WebView requires more stack
build_unflags =
    -Wl,--gc-sections

# Partition table optimized para display + app
board_build.partitions = partitions-custom.csv

# Monitor serial output
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

# OTA upload (optional)
upload_protocol = espota
upload_port = 192.168.1.XXX
upload_flags =
    --auth=cocina123
    --progress

[env:esp32-p4-usb]
# Para debugging via USB-C directo
extends = env:esp32-p4
upload_protocol = esptool
monitor_port = /dev/ttyUSB0
upload_port = /dev/ttyUSB0
