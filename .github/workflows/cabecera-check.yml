# CÚPULA DE LA CABECERA — el MOTOR en cada PR (órgano check).
# Valida marcadores/frontmatter (error duro) y canta STALE cuando el PR toca
# fuentes de una rebanada sin tocar la rebanada (empujón como comentario).
# Fase TESTIGO: stale no bloquea. Graduar a freno = hacer required este check
# y tratar stale como error en validate-cabecera.js.
name: cabecera-check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar cúpula (modo PR)
        id: validar
        run: |
          node scripts/cabecera/validate-cabecera.js --diff "origin/${{ github.base_ref }}" --json | tee /tmp/cabecera.json
          node scripts/cabecera/validate-cabecera.js --diff "origin/${{ github.base_ref }}"

      - name: Reflejo semántico (arma el expediente para el PRISMA)
        id: reflejo
        run: |
          node scripts/cabecera/sync-reflejo.js --diff "origin/${{ github.base_ref }}" --json | tee /tmp/reflejo.json
          node scripts/cabecera/sync-reflejo.js --diff "origin/${{ github.base_ref }}"

      - name: Empujón en el PR (stale / errores)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let r = { errores: [], stale: [], huerfanos: [], fuentesMuertas: [] };
            try { r = JSON.parse(fs.readFileSync('/tmp/cabecera.json', 'utf8')); } catch {}
            let ref = { expedientes: [] };
            try { ref = JSON.parse(fs.readFileSync('/tmp/reflejo.json', 'utf8')); } catch {}
            const marca = '<!-- cabecera-check -->';
            const hayAlgo = r.errores.length || r.stale.length || ref.expedientes.length;

            const lineas = [marca, '## 📜 cabecera-check'];
            if (r.errores.length) {
              lineas.push('', '**✗ Errores (bloquean):**');
              for (const e of r.errores) lineas.push(`- \`${e.archivo || ''}\` [${e.tipo}] ${e.detalle}`);
            }
            if (r.stale.length) {
              lineas.push('', '**⚠ Rebanadas que quedaron atrás de este PR** — actualiza la prosa o sella `verificado:` en el mismo PR:');
              for (const s of r.stale) lineas.push(`- \`arquitectura/cabecera/${s.archivo}\` (toca ${s.total} fichero(s) de sus fuentes: ${(s.fuentes_tocadas || []).join(', ')}${s.total > 5 ? ', …' : ''})`);
            }
            if (ref.expedientes.length) {
              lineas.push('', '**🔬 Deriva SEMÁNTICA posible** — el timestamp puede cuadrar pero la prosa quizá ya no describe el código. Pasa el expediente por el PRISMA: `/sincronizar-cabecera` (lentes: contrato · topics · comentarios · pendientes · números).');
              for (const e of ref.expedientes) {
                const extras = [];
                if (e.blueprints && e.blueprints.length) extras.push(`${e.blueprints.reduce((n, b) => n + b.pendientes.length, 0)} trabajo_pendiente a revisar`);
                if (e.comentarios_sospechosos && e.comentarios_sospechosos.length) extras.push(`${e.comentarios_sospechosos.length} comentario(s) a revisar`);
                lineas.push(`- \`${e.rebanada}\`${e.rebanada_tocada ? '' : ' (aún sin tocar en el PR)'} · toca ${e.ficheros_tocados.length} fichero(s)${extras.length ? ' · ' + extras.join(' · ') : ''}`);
              }
            }
            if (!hayAlgo) lineas.push('', '✓ La cabecera va al paso de este PR.');

            const cuerpo = lineas.join('\n');
            const { data: comentarios } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, per_page: 100
            });
            const previo = comentarios.find((c) => c.body && c.body.includes(marca));
            if (previo) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: previo.id, body: cuerpo });
            } else if (hayAlgo) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: cuerpo });
            }
