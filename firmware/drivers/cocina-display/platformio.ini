; PlatformIO Project Configuration
; Enki ESP32 Driver: Cocina Display
;
; Board:    Guition JC8012P4A1
; SoC:      ESP32-P4 (main) + ESP32-C6 (WiFi/BLE)
; Display:  ILI9881C MIPI-DSI 800×1280
; Touch:    GT911 I2C
;
; Build:  pio run
; Flash:  pio run -t upload (via TYPE-C ⑤)
; Serial: pio device monitor

[env:esp32p4]
platform = espressif32@^6.9.0
board = esp32-p4-function-ev-board
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Librería compartida enki-base
lib_extra_dirs = ../../lib

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    lvgl/lvgl@^9.2.0

; Componentes IDF se resuelven via idf_component.yml:
;   espressif/esp_lcd_ili9881c  — driver MIPI-DSI panel
;   espressif/esp_lcd_touch_gt911 — touch I2C

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

    ; LVGL
    -DLV_CONF_INCLUDE_SIMPLE
    -I src

    ; Stack
    -DARDUINO_LOOP_STACK_SIZE=16384

    ; Optimización
    -O2
