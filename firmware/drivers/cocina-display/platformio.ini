; PlatformIO Project Configuration
; Enki ESP32 Driver: Cocina Display
;
; Board:    Guition JC8012P4A1
; SoC:      ESP32-P4 (main) + ESP32-C6 (WiFi/BLE)
; Display:  ILI9881C MIPI-DSI 800×1280
; Touch:    GT911 I2C
;
; REQUISITO: usa pioarduino (soporte Arduino 3.x + ESP32-P4)
;   Más info: https://github.com/pioarduino/platform-espressif32
;
; Build:  pio run
; Flash:  pio run -t upload (via TYPE-C)
; Serial: pio device monitor

[env:esp32p4]
; pioarduino = Arduino 3.x con soporte ESP32-P4 (RISC-V)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = guition_jc8012p4a1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Librería compartida enki-base
lib_extra_dirs = ../../lib

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    lvgl/lvgl@^9.2.0

; Componentes IDF — se resuelven via idf_component.yml:
;   espressif/esp_lcd_ili9881c     — driver panel MIPI-DSI
;   espressif/esp_lcd_touch_gt911  — driver touch I2C

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

    ; LVGL
    -DLV_CONF_INCLUDE_SIMPLE
    -I src

    ; Stack del loop() más grande para LVGL
    -DARDUINO_LOOP_STACK_SIZE=16384

    ; Optimización
    -O2
