# SearXNG — backend de búsqueda para el /search de Crawl4RS (OPCIONAL).
#
# Solo hace falta si quieres `crawl4rs.buscar` (búsqueda de palabra-clave en la
# web abierta). leer/mapear/rastrear NO lo necesitan. SearXNG es Python → va en
# Docker, aislado; el contenedor enki-crawl4rs lo alcanza por la red compartida
# enki-web (nombre de servicio, sin exponer nada al host más allá de localhost).
#
# Levantar:  docker network create enki-web   # una vez (si no existe)
#            docker compose -f deployment/python-tools/docker-compose.searxng.yml up -d
# Cablear:   nada — el compose de deployment/crawl4rs/ ya apunta a
#            SEARXNG_URL=http://enki-searxng:8080 por defecto.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: enki-searxng
    ports:
      - "127.0.0.1:8080:8080"   # solo localhost (debug); crawl4rs entra por enki-web
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      # Secreto propio (vps-setup lo genera como SEARXNG_SECRET_KEY en data/.env).
      # OJO nombre: la app de SearXNG honra SEARXNG_SECRET (sin _KEY) — con el
      # nombre equivocado cae al default 'ultrasecretkey' y se NIEGA a arrancar
      # (bucle de reinicio, visto en vivo). Fail-closed: sin el secreto no levanta.
      - SEARXNG_SECRET=${SEARXNG_SECRET_KEY:?pon SEARXNG_SECRET_KEY (openssl rand -hex 32)}
    volumes:
      - searxng-data:/etc/searxng
      # Habilita format=json — crawl4rs /search lo exige; sin esto, 403 (visto en vivo).
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    networks: [enki-web]

volumes:
  searxng-data:

networks:
  enki-web:
    external: true
