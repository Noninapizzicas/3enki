; PlatformIO Project Configuration
; {{PROJECT_NAME}} — Gateway Impresora MQTT ↔ BLE
;
; Conecta al servidor via MQTT/WiFi y reenvía ESC/POS a impresora
; térmica por Bluetooth.
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:{{BOARD}}]
platform = {{PLATFORM}}
board = {{BOARD}}
framework = {{FRAMEWORK}}
monitor_speed = {{MONITOR_SPEED}}
upload_speed = {{UPLOAD_SPEED}}

board_build.partitions = min_spiffs.csv

lib_deps =
    ; MQTT client
    knolleary/PubSubClient@^2.8
    ; BLE — NimBLE es mas eficiente que la BLE default
    h2zero/NimBLE-Arduino@^1.4.0
    ; JSON parse/serialize
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
