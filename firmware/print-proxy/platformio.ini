; PlatformIO Project Configuration
; Enki ESP32 — Arquitectura BASE + LÓGICA
;
; BASE:   WiFi multi-red, MQTT, Portal web, NVS, OTA, Watchdog
; LÓGICA: Print Proxy (MQTT ←→ BLE thermal printer bridge)
;
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Particiones con espacio para OTA (2 app slots)
board_build.partitions = min_spiffs.csv

lib_deps =
    ; MQTT client — ligero y probado
    knolleary/PubSubClient@^2.8
    ; BLE — NimBLE es mas eficiente que la BLE default del ESP32
    h2zero/NimBLE-Arduino@^1.4.0
    ; JSON parse/serialize
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
