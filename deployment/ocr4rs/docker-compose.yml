# OCR4RS (repo ocr4rs) — el órgano de OCR en Rust puro (imagen/PDF escaneado →
# texto) como contenedor en el VPS. Es el motor que consume el puente
# modules/ocr4rs. Hermano de crawl4rs: crawl4rs lee la web, ocr4rs lo físico.
#
# Docker y no nativo: aunque OCR4RS es Rust puro (distroless de pocos MB, sin
# Chromium ni Python), va contenido por CONSISTENCIA con crawl4rs — un órgano
# web = un contenedor, se encuentran en el bus. Y así los modelos .rten viven
# en un volumen, no en el VPS.
#
# Traer y levantar:
#   git clone --depth 1 https://github.com/noninapizzicas/ocr4rs /opt/ocr4rs
#   ./scripts/get-models.sh /opt/enki/data/ocr4rs-models   # baja los .rten UNA vez
#   OCR4RS_MODELS_DIR=/opt/enki/data/ocr4rs-models \
#     docker compose -f deployment/ocr4rs/docker-compose.yml up -d --build
#
# Verificar:  curl -s http://127.0.0.1:8090/health   → {status, models_loaded:true}
# Cablear:    nada — modules/ocr4rs ya apunta a :8090. Solo encender el
#             interruptor 'ocr4rs' (panel/sistema, OFF por defecto).
#
# SIN AUTH (ley de la frontera): publica SOLO a 127.0.0.1 → la frontera vive
# en el host. OCR4RS no tiene JWT; el puente no hace baile de token.
#
# Puerto: 127.0.0.1:8090. Solo localhost: lo consume el core, no la web.

services:
  ocr4rs:
    build:
      # Clon del repo ocr4rs en el VPS. Override: OCR4RS_DIR=/ruta docker compose ...
      context: ${OCR4RS_DIR:-/opt/ocr4rs}
      dockerfile: Dockerfile
    image: enki-ocr4rs
    container_name: enki-ocr4rs
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      # El motor lee los modelos de /models (montado abajo). Sin ellos, /ocr
      # degrada con 503 honesto y el puente lo prescribe (monta el volumen).
      - OCR4RS_MODELS=/models
    volumes:
      # Los .rten NO se versionan (pesan MB): se descargan una vez con
      # scripts/get-models.sh y se montan de solo-lectura.
      - ${OCR4RS_MODELS_DIR:-/opt/enki/data/ocr4rs-models}:/models:ro
    networks: [enki-web]
    restart: unless-stopped
    # SIN healthcheck: la imagen es distroless (sin shell, sin curl) → no hay
    # con qué sondear desde dentro. La salud se comprueba desde el host
    # (curl :8090/health) y el puente degrada honesto si no responde.

# Red compartida entre órganos web (crawl4rs · ocr4rs · searxng). Se crea una vez:
#   docker network create enki-web
networks:
  enki-web:
    external: true
